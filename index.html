<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Vocabulario Avanzado - Clase</title>
    
    <style>
        :root { --p: #2c3e50; --a: #3498db; --bg: #f4f7f6; --ok: #27ae60; --bad: #e74c3c; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px 0;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* Título centrado */
        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.8rem;
            text-align: center;
        }

        /* Botones para cambiar entre filas */
        .row-selector {
            display: flex;
            gap: 10px;
            width: 90vw;
            max-width: 450px;
            margin-bottom: 15px;
        }

        .row-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--p);
            border-radius: 10px;
            background: white;
            color: var(--p);
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .row-btn.active {
            background: var(--p);
            color: white;
        }

        .card-container { 
            perspective: 1000px; 
            width: 90vw; 
            max-width: 450px; 
            height: 300px; 
            cursor: pointer;
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
        }

        .card { 
            width: 100%; 
            height: 100%; 
            position: relative; 
            transition: transform 0.4s; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border-radius: 15px;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
        }

        .card.flipped { transform: rotateY(180deg); }

        .face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 25px; 
            box-sizing: border-box; 
            border-radius: 15px; 
            text-align: center; 
            font-size: 1.4rem;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .front { background: white; color: var(--p); font-weight: bold; border: 2px solid #ddd; }
        .back { background: var(--a); color: white; transform: rotateY(180deg); font-size: 1.2rem; }

        .controls { 
            margin-top: 15px;
            display: flex; 
            gap: 10px; 
            width: 90vw; 
            max-width: 450px;
        }

        .action-controls {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            width: 90vw;
            max-width: 450px;
        }

        button { 
            flex: 1; 
            padding: 15px 10px; 
            border: none; 
            border-radius: 12px; 
            background: var(--p); 
            color: white; 
            font-size: 1rem; 
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation; 
        }

        .btn-know { background: var(--ok); }
        .btn-dont-know { background: var(--bad); }

        .info { margin-top: 12px; font-weight: bold; color: #7f8c8d; }

        @media (max-height: 600px) {
            .card-container { height: 220px; }
            .face { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <h1>Prensa y publicidad</h1>

    <div class="row-selector">
        <button class="row-btn active" id="btn-fila-no" onclick="setFila('no')">Por aprender (<span id="count-no">0</span>)</button>
        <button class="row-btn" id="btn-fila-si" onclick="setFila('si')">Ya aprendidas (<span id="count-si">0</span>)</button>
    </div>

    <div class="card-container" onclick="flip()">
        <div class="card" id="c">
            <div class="face front" id="q">Cargando...</div>
            <div class="face back" id="a">...</div>
        </div>
    </div>

    <div class="info" id="status">0 / 0</div>

    <div class="controls">
        <button onclick="prev()">⬅ Ant.</button>
        <button onclick="shuffle()">🔀 Mezclar</button>
        <button onclick="next()">Sig. ➡</button>
    </div>

    <div class="action-controls" id="eval-controls">
        <button class="btn-dont-know" onclick="clasificarPalabra(false)">❌ No la sé</button>
        <button class="btn-know" onclick="clasificarPalabra(true)">✔ Ya la sé</button>
    </div>

    // Listas dinámicas para clasificar las palabras
    let palabrasNoConozco = [...todasLasPalabras];
    let palabrasYaConozco = [];

    let filaActiva = 'no'; // 'no' (por aprender) o 'si' (ya aprendidas)
    let idx = 0;

    const cardEl = document.getElementById('c');
    const qEl = document.getElementById('q');
    const aEl = document.getElementById('a');
    const sEl = document.getElementById('status');

    function getListaActiva() {
        return filaActiva === 'no' ? palabrasNoConozco : palabrasYaConozco;
    }

    function update() {
        const lista = getListaActiva();
        cardEl.classList.remove('flipped');
        
        // Actualizar contadores dinámicamente en las pestañas superiores
        document.getElementById('count-no').innerText = palabrasNoConozco.length;
        document.getElementById('count-si').innerText = palabrasYaConozco.length;

        if (lista.length === 0) {
            qEl.innerText = "¡Lista vacía!";
            aEl.innerText = filaActiva === 'no' ? "¡Enhorabuena, has repasado todo!" : "No has añadido ninguna palabra aquí aún.";
            sEl.innerText = "0 / 0";
            return;
        }

        // Validación de límites del índice por si se vacían elementos
        if (idx >= lista.length) {
            idx = Math.max(0, lista.length - 1);
        }

        setTimeout(() => {
            qEl.innerText = lista[idx].q;
            aEl.innerText = lista[idx].a;
            sEl.innerText = `${idx + 1} / ${lista.length}`;
        }, 100);
    }

    function flip() { 
        const lista = getListaActiva();
        if (lista.length > 0) cardEl.classList.toggle('flipped'); 
    }
    
    function next() { 
        const lista = getListaActiva();
        if(idx < lista.length - 1) { idx++; update(); } 
    }
    
    function prev() { 
        if(idx > 0) { idx--; update(); } 
    }

    function shuffle() {
        const lista = getListaActiva();
        if (lista.length > 0) {
            lista.sort(() => Math.random() - 0.5);
            idx = 0;
            update();
        }
    }

    // Cambiar la pestaña de la fila actual
    function setFila(tipo) {
        filaActiva = tipo;
        idx = 0;
        
        if (tipo === 'no') {
            document.getElementById('btn-fila-no').classList.add('active');
            document.getElementById('btn-fila-si').classList.remove('active');
        } else {
            document.getElementById('btn-fila-no').classList.remove('active');
            document.getElementById('btn-fila-si').classList.add('active');
        }
        
        update();
    }

    // Clasificar las tarjetas entre aprendidas y por aprender
    function clasificarPalabra(loSabe) {
        let listaOrigen = filaActiva === 'no' ? palabrasNoConozco : palabrasYaConozco;
        let listaDestino = filaActiva === 'no' ? palabrasYaConozco : palabrasNoConozco;

        if (listaOrigen.length === 0) return;

        // Si la clasificación no implica moverla a otra lista, simplemente avanza
        if ((filaActiva === 'no' && !loSabe) || (filaActiva === 'si' && loSabe)) {
            next();
            return;
        }

        // Mover el elemento a la lista destino
        const palabraMovida = listaOrigen.splice(idx, 1)[0];
        listaDestino.push(palabraMovida);

        update();
    }

    // Atajos de teclado para ordenador
    document.addEventListener('keydown', (e) => {
        if(e.code === 'ArrowRight') next();
        if(e.code === 'ArrowLeft') prev();
        if(e.code === 'Space') flip();
    });

    update();
